name: Bijux Standard Checks

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  bijux_std:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run bijux standard checks
        env:
          BIJUX_STD_REF: ${{ github.event_name == 'push' && github.sha || 'main' }}
        run: make bijux-std-checks
