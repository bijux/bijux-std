<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bijux Docs Shell Fixture</title>
    <link rel="stylesheet" href="../../../shared/bijux-docs/styles/extra.css" />
  </head>
  <body>
    <input id="__drawer" type="checkbox" hidden />
    <input id="__search" type="checkbox" hidden />

    <header
      class="md-header"
      data-md-component="header"
      data-bijux-nav-mode="default"
      data-bijux-phone-nav="drawer"
      data-bijux-phone-compact="true"
      data-bijux-drawer-target="__drawer"
    >
      <nav class="md-header__inner md-grid" aria-label="Header">
        <a class="md-header__button md-logo" href="#" aria-label="Bijux">Bijux</a>
        <label
          class="md-header__button md-icon"
          for="__drawer"
          role="button"
          tabindex="0"
          aria-controls="__drawer"
          aria-label="Open navigation drawer"
          data-bijux-header-control="drawer-toggle"
          data-bijux-phone-compact="keep"
        >
          ☰
        </label>
        <div class="md-header__title" data-bijux-header-title="primary">
          <div class="md-header__ellipsis">
            <div class="md-header__topic" data-bijux-header-topic="site" data-bijux-phone-compact="keep">
              <span class="md-ellipsis">Bijux</span>
            </div>
            <div class="md-header__topic" data-md-component="header-topic" data-bijux-header-topic="page" data-bijux-phone-compact="hide">
              <span class="md-ellipsis">System Map</span>
            </div>
          </div>
        </div>
        <div class="bijux-header-tools">
          <label
            class="md-header__button md-icon"
            for="__search"
            role="button"
            tabindex="0"
            aria-controls="__search"
            aria-label="Open search"
            data-bijux-header-control="search-toggle"
          >
            🔍
          </label>
          <div class="md-search" data-md-component="search" role="dialog">
            <label class="md-search__overlay" for="__search"></label>
            <div class="md-search__inner" role="search">
              <form class="md-search__form" name="search">
                <input
                  type="text"
                  class="md-search__input"
                  name="query"
                  aria-label="Search"
                  placeholder="Search"
                  autocapitalize="off"
                  autocorrect="off"
                  autocomplete="off"
                  spellcheck="false"
                />
              </form>
              <div class="md-search__output">
                <div class="md-search-result__meta">Type to start searching</div>
              </div>
            </div>
          </div>
        </div>
      </nav>

      <nav class="bijux-hub-strip" data-bijux-row-scope="desktop-normal" data-bijux-phone-compact="hide">
        <ul class="bijux-tabs__list bijux-tabs__list--hub">
          <li class="bijux-tabs__item"><a class="bijux-tabs__link bijux-tabs__link--hub" href="#">Bijux</a></li>
        </ul>
      </nav>

      <nav class="md-tabs bijux-site-tabs" data-bijux-row-scope="desktop-normal" data-bijux-phone-compact="hide">
        <div class="md-grid"><ul class="md-tabs__list bijux-tabs__list bijux-tabs__list--site"><li class="md-tabs__item bijux-tabs__item"><a class="md-tabs__link bijux-tabs__link bijux-tabs__link--site" href="#">Platform</a></li></ul></div>
      </nav>

      <nav class="bijux-detail-tabs" data-bijux-row-scope="desktop-normal" data-bijux-phone-compact="hide">
        <div class="md-grid"><ul class="bijux-tabs__list bijux-tabs__list--detail"><li class="bijux-tabs__item"><a class="bijux-tabs__link bijux-tabs__link--detail" href="#">Overview</a></li></ul></div>
      </nav>

      <nav class="bijux-detail-tabs bijux-course-tabs" data-bijux-row-scope="desktop-normal" data-bijux-phone-compact="hide">
        <div class="md-grid"><ul class="bijux-tabs__list bijux-tabs__list--detail bijux-tabs__list--course"><li class="bijux-tabs__item"><a class="bijux-tabs__link bijux-tabs__link--course" href="#">Course</a></li></ul></div>
      </nav>
    </header>

    <main class="md-main">
      <div class="md-main__inner">
        <aside class="md-sidebar md-sidebar--primary">
          <div class="md-sidebar__scrollwrap">
            <div class="md-sidebar__inner">
              <nav class="md-nav md-nav--primary bijux-nav bijux-nav--mobile" data-bijux-nav-variant="mobile">
                <label class="md-nav__title bijux-nav__title" for="__drawer">
                  <span class="bijux-nav__title-text">
                    <span class="bijux-nav__site-name">Bijux</span>
                    <span class="bijux-nav__section-name">Platform</span>
                  </span>
                </label>
                <section class="bijux-mobile-local" data-bijux-mobile-order="1-top-directories">
                  <div class="bijux-mobile-local__label">Directories</div>
                  <ul class="md-nav__list" data-md-scrollfix>
                    <li class="md-nav__item"><a class="md-nav__link" href="#">Systems</a></li>
                    <li class="md-nav__item md-nav__item--active"><a class="md-nav__link" href="#" aria-current="page">Data</a></li>
                  </ul>
                </section>
                <section class="bijux-mobile-local" data-bijux-mobile-order="4-pages">
                  <div class="bijux-mobile-local__label">Pages</div>
                  <ul class="md-nav__list" data-md-scrollfix>
                    <li class="md-nav__item"><a class="md-nav__link" href="#">Overview</a></li>
                    <li class="md-nav__item"><a class="md-nav__link" href="#">Reading Paths</a></li>
                  </ul>
                </section>
                <section class="bijux-mobile-hub" data-bijux-mobile-order="5-sites">
                  <div class="bijux-mobile-hub__label">Sites</div>
                  <ul class="bijux-mobile-hub__list">
                    <li class="bijux-mobile-hub__item bijux-mobile-hub__item--active"><a class="bijux-mobile-hub__link" href="#" aria-current="page">Bijux</a></li>
                    <li class="bijux-mobile-hub__item"><a class="bijux-mobile-hub__link" href="#">Pollenomics</a></li>
                    <li class="bijux-mobile-hub__item"><a class="bijux-mobile-hub__link" href="#">Masterclass</a></li>
                  </ul>
                </section>
              </nav>

              <nav class="md-nav md-nav--primary bijux-nav bijux-nav--scoped" data-bijux-nav-variant="scoped" data-bijux-nav-empty="false">
                <label class="md-nav__title" for="__drawer">Scoped</label>
                <ul class="md-nav__list" data-md-scrollfix>
                  <li class="md-nav__item"><a class="md-nav__link" href="#">Scoped Item</a></li>
                </ul>
              </nav>
            </div>
          </div>
        </aside>

        <article class="md-content">
          <div class="md-content__inner">
            <h1>Fixture Page</h1>
            <p>Responsive shell behavior fixture.</p>
          </div>
        </article>
      </div>
    </main>

    <script src="../../../shared/bijux-docs/scripts/viewport-profile.js"></script>
  </body>
</html>
