<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Project Root Fixture</title>
    <link rel="stylesheet" href="../../../../shared/bijux-docs/styles/extra.css" />
    <link rel="stylesheet" href="./navigation-fixture.css" />
  </head>
  <body>
    <input id="__drawer" type="checkbox" hidden />

    <header class="md-header" data-md-component="header" data-bijux-phone-nav="drawer" data-bijux-phone-compact="true">
      <nav class="md-header__inner md-grid" aria-label="Header">
        <label
          class="md-header__button md-icon"
          for="__drawer"
          role="button"
          tabindex="0"
          aria-controls="__drawer"
          aria-label="Open navigation drawer"
          data-bijux-header-control="drawer-toggle"
          data-bijux-phone-compact="keep"
        >☰</label>
        <div class="md-header__title" data-bijux-header-title="primary">
          <div class="md-header__ellipsis"><span class="md-ellipsis" data-bijux-site-title>Core</span></div>
        </div>
      </nav>

      <nav class="bijux-hub-strip" data-bijux-row-scope="desktop-normal" data-bijux-phone-compact="hide">
        <ul class="bijux-tabs__list bijux-tabs__list--hub">
          <li class="bijux-tabs__item">
            <a class="bijux-tabs__link bijux-tabs__link--hub" href="/tests/bijux-docs/ui/fixtures/navigation-hub-home.html">Bijux</a>
          </li>
          <li class="bijux-tabs__item bijux-tabs__item--active">
            <a class="bijux-tabs__link bijux-tabs__link--hub" aria-current="page" href="/tests/bijux-docs/ui/fixtures/navigation-project-root.html">Core</a>
          </li>
        </ul>
      </nav>

      <nav class="md-tabs bijux-site-tabs" data-bijux-row-scope="desktop-normal" data-bijux-phone-compact="hide">
        <div class="md-grid">
          <ul class="md-tabs__list bijux-tabs__list bijux-tabs__list--site">
            <li class="md-tabs__item bijux-tabs__item bijux-tabs__item--active">
              <a class="md-tabs__link bijux-tabs__link bijux-tabs__link--site" aria-current="page" href="/tests/bijux-docs/ui/fixtures/navigation-project-root.html">Core Docs</a>
            </li>
          </ul>
        </div>
      </nav>

      <nav class="bijux-detail-tabs" data-bijux-row-scope="desktop-normal" data-bijux-phone-compact="hide">
        <div class="md-grid">
          <ul class="bijux-tabs__list bijux-tabs__list--detail">
            <li class="bijux-tabs__item"><a class="bijux-tabs__link bijux-tabs__link--detail" href="#">Overview</a></li>
          </ul>
        </div>
      </nav>
    </header>

    <main class="md-main">
      <div class="md-main__inner">
        <aside class="md-sidebar md-sidebar--primary">
          <div class="md-sidebar__scrollwrap">
            <div class="md-sidebar__inner">
              <nav class="md-nav md-nav--primary bijux-nav bijux-nav--mobile" data-bijux-nav-variant="mobile">
                <section class="bijux-mobile-local" data-bijux-mobile-order="1-top-directories" data-bijux-mobile-kind="directories">
                  <div class="bijux-mobile-local__label">Directories</div>
                  <ul class="md-nav__list" data-md-scrollfix>
                    <li class="md-nav__item"><a class="md-nav__link" href="#">Systems</a></li>
                    <li class="md-nav__item"><a class="md-nav__link" href="#">Data</a></li>
                  </ul>
                </section>
                <section class="bijux-mobile-hub" data-bijux-mobile-order="5-sites" data-bijux-mobile-kind="sites">
                  <div class="bijux-mobile-hub__label">Sites</div>
                  <ul class="bijux-mobile-hub__list" data-bijux-sites-list>
                    <li class="bijux-mobile-hub__item" data-site-key="bijux">
                      <a class="bijux-mobile-hub__link" href="/tests/bijux-docs/ui/fixtures/navigation-hub-home.html">Bijux</a>
                    </li>
                    <li class="bijux-mobile-hub__item bijux-mobile-hub__item--active" data-site-key="core">
                      <a class="bijux-mobile-hub__link" aria-current="page" href="/tests/bijux-docs/ui/fixtures/navigation-project-root.html">Core</a>
                    </li>
                    <li class="bijux-mobile-hub__item" data-site-key="canon">
                      <a class="bijux-mobile-hub__link" href="/tests/bijux-docs/ui/fixtures/navigation-project-root.html?site=canon">Canon</a>
                    </li>
                    <li class="bijux-mobile-hub__item" data-site-key="atlas">
                      <a class="bijux-mobile-hub__link" href="/tests/bijux-docs/ui/fixtures/navigation-project-root.html?site=atlas">Atlas</a>
                    </li>
                    <li class="bijux-mobile-hub__item" data-site-key="proteomics">
                      <a class="bijux-mobile-hub__link" href="/tests/bijux-docs/ui/fixtures/navigation-project-root.html?site=proteomics">Proteomics</a>
                    </li>
                    <li class="bijux-mobile-hub__item" data-site-key="pollenomics">
                      <a class="bijux-mobile-hub__link" href="/tests/bijux-docs/ui/fixtures/navigation-project-root.html?site=pollenomics">Pollenomics</a>
                    </li>
                    <li class="bijux-mobile-hub__item" data-site-key="masterclass">
                      <a class="bijux-mobile-hub__link" href="/tests/bijux-docs/ui/fixtures/navigation-project-root.html?site=masterclass">Masterclass</a>
                    </li>
                  </ul>
                </section>
              </nav>
              <nav
                class="md-nav md-nav--primary bijux-nav bijux-nav--scoped"
                data-bijux-nav-variant="scoped"
                data-bijux-nav-empty="false"
              >
                <ul class="md-nav__list" data-md-scrollfix>
                  <li class="md-nav__item"><a class="md-nav__link" href="#">Scoped Link</a></li>
                </ul>
              </nav>
            </div>
          </div>
        </aside>
        <article class="md-content">
          <div class="md-content__inner"><h1>Project Root</h1></div>
        </article>
      </div>
    </main>

    <script>
      (() => {
        const selected = (new URLSearchParams(window.location.search).get("site") || "core").toLowerCase();
        const labels = {
          core: "Core",
          canon: "Canon",
          atlas: "Atlas",
          proteomics: "Proteomics",
          pollenomics: "Pollenomics",
          masterclass: "Masterclass",
        };
        const normalized = labels[selected] ? selected : "core";
        const sites = Array.from(document.querySelectorAll("[data-bijux-sites-list] [data-site-key]"));

        for (const item of sites) {
          const link = item.querySelector(".bijux-mobile-hub__link");
          const isActive = item.getAttribute("data-site-key") === normalized;
          item.classList.toggle("bijux-mobile-hub__item--active", isActive);
          if (link) {
            if (isActive) {
              link.setAttribute("aria-current", "page");
            } else {
              link.removeAttribute("aria-current");
            }
          }
        }

        const title = document.querySelector("[data-bijux-site-title]");
        if (title) {
          title.textContent = labels[normalized] || "Core";
        }
      })();
    </script>
    <script src="../../../../shared/bijux-docs/scripts/viewport-profile.js"></script>
  </body>
</html>
